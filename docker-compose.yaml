version: '3.8'

services:
  app:
    image: ghcr.io/mukhammedal1/uzko_backend:latest
    ports:
      - '3002:3002'
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - app-network
    volumes:
      - uploads_data:/app/uploads

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  uploads_data:
  postgres-data:
